# CrowdViT base configuration — matches Section 5.3 (Implementation Details) of the paper.
model:
  num_frames: 16
  image_size: 224
  patch_size: 16
  stem_channels: 64
  stem_descriptor_dim: 256
  hidden_dim: 768
  num_heads: 8
  kernel_dim: 256
  view_window_sizes: [8, 4, 2]
  view_mode: adaptive
  attention_type: performer
  fusion_type: kga
  affinity_type: learnable
  use_global_fusion_encoder: true
  view_encoder_depth: 4
  fusion_encoder_depth: 2
  mlp_ratio: 4.0
  attn_dropout: 0.1
  proj_dropout: 0.1
  head_dropout: 0.3
  num_classes: 400

loss:
  lambda_temp: 0.1
  lambda_view: 0.1
  use_temporal_loss: true
  use_view_loss: true
  view_collapse_weight: 1.0
  view_collapse_target_std: 1.0
  label_smoothing: 0.0

optim:
  lr: 1.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]
  warmup_epochs: 5
  epochs: 50
  batch_size: 16
  grad_clip: 1.0
  amp: true

data:
  name: kinetics400
  train_manifest: data/manifests/kinetics400_train.csv
  val_manifest: data/manifests/kinetics400_val.csv
  test_manifest: data/manifests/kinetics400_test.csv
  class_map: data/manifests/kinetics400_classes.json
  num_workers: 8
  frame_stride: 4
  clip_sampling: random

train:
  seed: 42
  output_dir: outputs/crowdvit_base
  log_interval: 20
  checkpoint_interval: 1
  device: cuda
  distributed: false
